trigger:
  - master

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '18.x'
    displayName: "Install Node.js"

  - script: npm install
    workingDirectory: 'src'
    displayName: "Install dependencies"

  - script: npm test
    workingDirectory: 'src'
    displayName: "Run tests"

  - script: echo "hello"
    displayName: "Deploy step (just printing hello)"